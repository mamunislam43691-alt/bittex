version: '3.9'

services:
  # ── Backend API ──
  server:
    build: ./server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CLIENT_URL=${CLIENT_URL}
      - NODE_ENV=production
      - OTP_USER_RATE=${OTP_USER_RATE:-0.005}
      - OTP_AGENT_COMMISSION=${OTP_AGENT_COMMISSION:-15}
    depends_on:
      - mongo
    networks:
      - bittx_net

  # ── MongoDB (local, optional — use Atlas if preferred) ──
  mongo:
    image: mongo:7
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=bittxsms
    networks:
      - bittx_net

  # ── Frontend (built static files served by nginx) ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - server
    networks:
      - bittx_net

  # ── SSL Certificates (Let's Encrypt) ──
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done;'"

volumes:
  mongo_data:
  certbot_certs:
  certbot_www:

networks:
  bittx_net:
    driver: bridge
